<script>
// =============================
// 🌌 NORTHSKY CORE ENGINE (PRO)
// =============================

const NorthSky = {
  state: {
    paid: false,
    uses: parseInt(localStorage.getItem("ns_uses") || "0"),
    email: localStorage.getItem("ns_email") || null
  },

  config: {
    freeLimit: 3,
    checkout: {
      "one-time": "https://buy.stripe.com/cNi6oA1eraKU7ZR1QQ2ZO0u",
      "monthly": "https://buy.stripe.com/00w8wIg9lf1a0xpbrq2ZO0v"
    }
  }
};

// =============================
// 🚀 INIT
// =============================
NorthSky.init = async function () {
  this.updateStatus();
  if (this.state.email) await this.checkAccess();
};

// =============================
// 🔐 CHECK USER ACCESS
// =============================
NorthSky.checkAccess = async function () {
  try {
    const res = await fetch("/api/check-user", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: this.state.email })
    });

    const data = await res.json();
    this.state.paid = !!data?.paid;

  } catch (err) {
    console.error("Access check failed:", err);
    this.state.paid = false;
  }

  this.updateStatus();
};

// =============================
// 📊 STATUS UI
// =============================
NorthSky.updateStatus = function () {
  const el = document.getElementById("usageStatus");
  if (!el) return;

  if (this.state.paid) {
    el.innerHTML = "✅ Pro — Unlimited Access";
  } else {
    const remaining = Math.max(0, this.config.freeLimit - this.state.uses);
    el.innerHTML = `⚠️ Free Plan — ${remaining} uses left`;
  }
};

// =============================
// 👤 SAVE USER
// =============================
NorthSky.saveUser = function () {
  const email = document.getElementById("email").value.trim();

  if (!email || !email.includes("@")) {
    alert("Enter a valid email");
    return;
  }

  this.state.email = email;
  localStorage.setItem("ns_email", email);

  document.getElementById("userStatus").innerText = "✅ Saved";

  this.checkAccess();
};

// =============================
// 💳 CHECKOUT
// =============================
NorthSky.checkout = function (type = "one-time") {
  if (!this.state.email) {
    alert("Enter your email first");
    return;
  }

  const url =
    this.config.checkout[type] +
    `?prefilled_email=${encodeURIComponent(this.state.email)}`;

  window.location.href = url;
};

// =============================
// ⏳ UTIL
// =============================
NorthSky.delay = (ms) => new Promise(res => setTimeout(res, ms));

// =============================
// 🤖 CLEAN AI CALL (FIXED)
// =============================
NorthSky.callAI = async function (site) {
  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ site })
  });

  return await res.json();
};

// =============================
// 🚀 MAIN ANALYZE (UPGRADED)
// =============================
NorthSky.analyze = async function () {
  const inputEl = document.getElementById("site");
  const output = document.getElementById("output");

  let site = inputEl.value.trim();

  // ❌ validation
  if (!site) return output.innerText = "Enter your website URL";
  if (!site.includes(".")) return output.innerText = "Enter a valid website";

  if (!site.startsWith("http")) {
    site = "https://" + site;
  }

  // 🚫 FREE LIMIT
  if (!this.state.paid && this.state.uses >= this.config.freeLimit) {
    output.innerHTML = `
      🚫 Free limit reached<br><br>
      <button onclick="NorthSky.checkout()">Unlock Full AI 🚀</button>
    `;
    return;
  }

  // increment usage
  this.state.uses++;
  localStorage.setItem("ns_uses", this.state.uses);
  this.updateStatus();

  // 🎬 better loading UX
  output.innerHTML = `
    🤖 Scanning website...<br>
    🔍 Analyzing SEO structure...
  `;

  await this.delay(600);

  try {
    // =============================
    // 💡 AI CALL (STRUCTURED PROMPT)
    // =============================
    const data = await this.callAI(site);

    const result =
      data.result ||
      data.output?.[0]?.content?.[0]?.text ||
      "No response";

    // =============================
    // 🧠 TRY PARSING SCORES
    // =============================
    const seo = result.match(/SEO Score:\s*(\d+)/)?.[1];
    const ux = result.match(/UX Score:\s*(\d+)/)?.[1];
    const conv = result.match(/Conversion Score:\s*(\d+)/)?.[1];

    // =============================
    // 🎨 RENDER OUTPUT
    // =============================
    output.innerHTML = `
      <div style="background:#0f172a;padding:15px;border-radius:10px;">
        
        <h3>📊 AI Website Report</h3>

        <p>🌐 <strong>SEO:</strong> ${seo || "N/A"}/100</p>
        <p>🎨 <strong>UX:</strong> ${ux || "N/A"}/100</p>
        <p>💰 <strong>Conversion:</strong> ${conv || "N/A"}/100</p>

        <hr style="margin:10px 0;opacity:0.2;">

        <pre style="white-space:pre-wrap;">${result}</pre>

      </div>
    `;

  } catch (err) {
    console.error(err);
    output.innerHTML = "⚠️ AI request failed";
  }
};

// =============================
// 🚀 START
// =============================
NorthSky.init();
</script>
