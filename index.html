<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NorthSky AI | Website Grader</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
  padding:30px;
}

h1{
  font-size:2.2rem;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  max-width:500px;
  margin-left:auto;
  margin-right:auto;
}

.btn{
  padding:14px;
  width:100%;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
  height:80px;
}

#output{
  margin-top:15px;
  padding:15px;
  background:#0f172a;
  border-radius:8px;
  text-align:left;
}
</style>
</head>

<body>

<h1>🚀 AI Website Grader</h1>
<p>Find out why your website is losing customers</p>

<!-- GRADER -->
<div class="card">
  <h3>Analyze Your Website</h3>

  <textarea id="site" placeholder="Paste your website URL..."></textarea>

  <button onclick="analyzeSite()" class="btn">
    Analyze Website
  </button>

  <div id="output"></div>
</div>

<!-- UPSELL -->
<div class="card">
  <h3>🔓 Unlock Full System</h3>
  <p>$9 one-time</p>

  <a href="https://buy.stripe.com/bJe7sE9KXdX63JBeDC2ZO0t?success_url=https://north-sky-ai.vercel.app/success.html">
    <button class="btn">Unlock Unlimited</button>
  </a>
</div>

<script>
let paid = localStorage.getItem("paid") === "true";

function analyzeSite() {
  const input = document.getElementById("site").value;
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Enter a website URL";
    return;
  }

  // 🧠 BASIC REAL ANALYSIS LOGIC
  let score = 100;
  let issues = [];

  if (!input.includes("http")) {
    issues.push("Missing proper URL structure");
    score -= 10;
  }

  if (input.length < 10) {
    issues.push("Very little content detected");
    score -= 20;
  }

  if (!input.includes(".")) {
    issues.push("Domain may be invalid");
    score -= 10;
  }

  // fallback issues (simulate AI thinking)
  if (issues.length < 3) {
    issues.push("No clear headline detected");
    issues.push("Weak SEO structure");
    issues.push("Poor conversion flow");
    score -= 20;
  }

  let preview = `
    <strong>Website Score: ${score}/100 ⚠️</strong><br>
    Goal: Reach 90+ 🚀<br><br>

    ✔ Design: Decent<br>
    ❌ SEO: Weak<br>
    ❌ Conversion: Poor<br><br>

    <strong>Top Issues:</strong><br>
    ${issues.map(i => "- " + i).join("<br>")}
  `;

  // 🔒 PAYWALL
  if (!paid) {
    output.innerHTML = preview + `
      <br><br>
      🔒 Unlock full breakdown + fixes<br><br>

      <a href="https://buy.stripe.com/cNi6oA1eraKU7ZR1QQ2ZO0u?success_url=https://north-sky-ai.vercel.app/success.html">
        <button class="btn">Unlock Full Report ($9)</button>
      </a>
    `;
    return;
  }

  // 💰 FULL ANALYSIS
  output.innerHTML = preview + `
    <br><br>
    <strong>How to Improve:</strong><br><br>

    + Add strong headline → +15 points<br>
    + Add testimonials → +10 points<br>
    + Add trust badges → +10 points<br>
    + Improve CTA → +15 points<br><br>

    <strong>Potential Score: ${score + 30}+/100 🚀</strong><br><br>

    <button onclick="reanalyze()" class="btn">
      Re-analyze After Fixes
    </button>
  `;
}

function reanalyze() {
  analyzeSite();
}
</script>

</body>
</html>
