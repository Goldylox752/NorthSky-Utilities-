<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky AI Auditor</title>

<style>
:root{
  --bg:#05060a;
  --card:rgba(255,255,255,0.04);
  --border:rgba(148,163,184,0.15);
  --accent:#38bdf8;
  --text:#ffffff;
  --muted:rgba(255,255,255,0.65);
  --green:#22c55e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",Arial;
  background:
    radial-gradient(circle at 20% 10%, rgba(56,189,248,0.12), transparent 45%),
    radial-gradient(circle at 80% 20%, rgba(34,197,94,0.10), transparent 45%),
    var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:50px 20px;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:850px;
}

/* HEADER */
h1{
  font-size:34px;
  letter-spacing:-0.5px;
}

.sub{
  color:var(--muted);
  margin-top:6px;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  backdrop-filter:blur(14px);
  margin-top:14px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.2);
  color:var(--text);
  margin-top:8px;
  outline:none;
}

input:focus{
  border-color:var(--accent);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:999px;
  border:none;
  background:var(--accent);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

button:disabled{
  opacity:0.5;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:14px;
}

/* METRIC CARD */
.metric{
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
}

.metric h3{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

.metric .value{
  font-size:22px;
  font-weight:700;
  color:var(--green);
}

/* OUTPUT */
.output{
  white-space:pre-wrap;
  line-height:1.6;
  color:var(--muted);
}

.loading{
  color:var(--accent);
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 NorthSky AI Auditor</h1>
<p class="sub">AI-powered website intelligence & performance analysis</p>

<!-- INPUT -->
<div class="card">
  <input id="site" placeholder="Enter website (example.com)" />
  <input id="email" placeholder="Email (optional)" />

  <button id="btn" onclick="analyzeSite()">Analyze Website</button>
</div>

<!-- RESULTS -->
<div id="output" class="card output">
  Waiting for analysis...
</div>

<!-- METRICS -->
<div id="metrics" class="grid" style="display:none;">
  <div class="metric">
    <h3>SEO</h3>
    <div class="value" id="seo">--</div>
  </div>

  <div class="metric">
    <h3>UX</h3>
    <div class="value" id="ux">--</div>
  </div>

  <div class="metric">
    <h3>Conversion</h3>
    <div class="value" id="conv">--</div>
  </div>
</div>

</div>

<script>

const state = {
  uses: parseInt(localStorage.getItem("ns_uses") || "0"),
  limit: 3
};

async function analyzeSite(){
  let site = document.getElementById("site").value.trim();
  const email = document.getElementById("email").value.trim();

  const output = document.getElementById("output");
  const btn = document.getElementById("btn");

  if(!site){
    output.innerText = "⚠️ Enter a website";
    return;
  }

  if(!site.startsWith("http")){
    site = "https://" + site;
  }

  if(state.uses >= state.limit){
    output.innerHTML = "🚫 Free limit reached";
    return;
  }

  state.uses++;
  localStorage.setItem("ns_uses", state.uses);

  btn.disabled = true;
  btn.innerText = "Analyzing...";

  output.innerHTML = "<span class='loading'>🧠 Running AI audit...</span>";

  try{
    const res = await fetch("/api/analyze", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({site,email})
    });

    const data = await res.json();
    const text = data?.result;

    if(!text){
      output.innerText = "No response";
      return;
    }

    const parsed = parse(text);

    // show metrics
    document.getElementById("metrics").style.display = "grid";
    document.getElementById("seo").innerText = parsed.seo;
    document.getElementById("ux").innerText = parsed.ux;
    document.getElementById("conv").innerText = parsed.conv;

    output.innerHTML = text;

  } catch(e){
    output.innerText = "⚠️ Failed to analyze site";
  }

  btn.disabled = false;
  btn.innerText = "Analyze Website";
}

function parse(text){
  return {
    seo: find(text,"SEO Score"),
    ux: find(text,"UX Score"),
    conv: find(text,"Conversion Score")
  };
}

function find(t,k){
  const r = new RegExp(k+":\\s*(\\d+\\/\\d+)");
  const m = t.match(r);
  return m?m[1]:"--";
}

</script>

</body>
</html>
