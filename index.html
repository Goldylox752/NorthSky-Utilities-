<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky AI Auditor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  font-weight:600;
}

.logo {
  font-size:18px;
}

.badge {
  opacity:0.6;
}

/* LAYOUT */
.container {
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}

/* HERO */
.hero {
  text-align:center;
  margin-top:40px;
}

.hero h1 {
  font-size:40px;
  margin-bottom:10px;
}

.hero p {
  opacity:0.6;
}

/* CARD */
.card {
  margin-top:20px;
  padding:18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(148,163,184,0.15);
  border-radius:16px;
  backdrop-filter:blur(12px);
}

/* INPUTS */
input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,0.2);
  background:#0f172a;
  color:white;
  margin-top:10px;
  outline:none;
}

input:focus {
  border-color:#38bdf8;
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  background:#3b82f6;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:#2563eb;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:20px;
}

/* METRIC */
.metric {
  padding:16px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(148,163,184,0.15);
}

.metric h3 {
  font-size:12px;
  opacity:0.6;
}

.metric .value {
  font-size:22px;
  font-weight:700;
  margin-top:6px;
  color:#22c55e;
}

/* OUTPUT */
.output {
  white-space:pre-wrap;
  line-height:1.6;
  opacity:0.8;
}

/* LOADING */
.loading {
  color:#38bdf8;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">NorthSky AI</div>
  <div class="badge">Auditor</div>
</div>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>🧠 AI Website Auditor</h1>
    <p>SEO • UX • Conversion intelligence in seconds</p>
  </div>

  <!-- INPUT -->
  <div class="card">
    <input id="site" placeholder="Enter website (example.com)" />
    <input id="email" placeholder="Email (optional)" />
    <button id="btn" onclick="analyzeSite()">Analyze Website</button>
  </div>

  <!-- OUTPUT -->
  <div id="output" class="card output">
    Ready to analyze a website.
  </div>

  <!-- METRICS -->
  <div id="metrics" class="grid" style="display:none;">

    <div class="metric">
      <h3>SEO Score</h3>
      <div class="value" id="seo">--</div>
    </div>

    <div class="metric">
      <h3>UX Score</h3>
      <div class="value" id="ux">--</div>
    </div>

    <div class="metric">
      <h3>Conversion</h3>
      <div class="value" id="conv">--</div>
    </div>

  </div>

</div>

<script>

const state = {
  uses: parseInt(localStorage.getItem("ns_uses") || "0"),
  limit: 3
};

async function analyzeSite(){
  let site = document.getElementById("site").value.trim();
  const email = document.getElementById("email").value.trim();

  const output = document.getElementById("output");
  const btn = document.getElementById("btn");

  if(!site){
    output.innerText = "⚠️ Enter a website";
    return;
  }

  if(!site.startsWith("http")){
    site = "https://" + site;
  }

  if(state.uses >= state.limit){
    output.innerText = "🚫 Free limit reached";
    return;
  }

  state.uses++;
  localStorage.setItem("ns_uses", state.uses);

  btn.disabled = true;
  btn.innerText = "Analyzing...";

  output.innerHTML = "<span class='loading'>🧠 Running AI audit...</span>";

  try {
    const res = await fetch("/api/analyze", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({site,email})
    });

    const data = await res.json();
    const text = data?.result;

    if(!text){
      output.innerText = "No response";
      return;
    }

    const seo = extract(text,"SEO Score");
    const ux = extract(text,"UX Score");
    const conv = extract(text,"Conversion Score");

    document.getElementById("metrics").style.display = "grid";
    document.getElementById("seo").innerText = seo;
    document.getElementById("ux").innerText = ux;
    document.getElementById("conv").innerText = conv;

    output.innerHTML = text;

  } catch(e){
    output.innerText = "⚠️ Failed to analyze site";
  }

  btn.disabled = false;
  btn.innerText = "Analyze Website";
}

function extract(text,label){
  const match = text.match(new RegExp(label + ":\\s*(\\d+\\/\\d+)"));
  return match ? match[1] : "--";
}

</script>

</body>
</html>
