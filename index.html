<script>
// 🔐 GLOBAL STATE
let paid = false;
let uses = parseInt(localStorage.getItem("uses") || "0");

// 🔥 CHECK ACCESS (REAL BACKEND)
async function checkAccess() {
  const email = localStorage.getItem("userEmail");
  if (!email) return;

  try {
    const res = await fetch("/api/check-user", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email })
    });

    const data = await res.json();
    paid = data.paid;

  } catch {
    paid = false;
  }

  updateStatus();
}

// 🔥 STATUS UI
function updateStatus() {
  const el = document.getElementById("usageStatus");

  if (paid) {
    el.innerHTML = "✅ Pro User — Unlimited Access";
  } else {
    el.innerHTML = `⚠️ Free Plan — ${Math.max(0,3-uses)} analyses left`;
  }
}

// 👤 SAVE USER
function saveUser() {
  const email = document.getElementById("email").value;
  if (!email) return;

  localStorage.setItem("userEmail", email);
  document.getElementById("userStatus").innerText = "✅ Account saved";

  checkAccess(); // 🔥 re-check after saving
}

// 💳 STRIPE CHECKOUT (WITH EMAIL)
function goToCheckout(type = "one-time") {
  const email = localStorage.getItem("userEmail");

  if (!email) {
    alert("Enter your email first");
    return;
  }

  let link = "";

  if (type === "monthly") {
    link = "https://buy.stripe.com/00w8wIg9lf1a0xpbrq2ZO0v";
  } else {
    link = "https://buy.stripe.com/cNi6oA1eraKU7ZR1QQ2ZO0u";
  }

  window.location.href = `${link}?prefilled_email=${encodeURIComponent(email)}`;
}

// 📊 LOAD REPORTS
function loadReports() {
  const reports = JSON.parse(localStorage.getItem("reports") || "[]");
  const container = document.getElementById("reports");

  container.innerHTML = "";

  if (!reports.length) {
    container.innerHTML = "No reports yet";
    return;
  }

  reports.slice().reverse().forEach(r => {
    const div = document.createElement("div");
    div.className = "report";

    div.innerHTML = `
      <strong>${r.site}</strong><br>
      <small>${r.date}</small><br><br>
      ${r.result.substring(0,120)}...
    `;

    container.appendChild(div);
  });
}

// 🧠 SCORING ENGINE
function calculateScore(input) {
  let score = 50;

  if (input.includes("shop") || input.includes("store")) score += 10;
  if (input.includes("ai")) score += 5;
  if (input.length > 20) score += 10;
  if (input.includes("https")) score += 5;

  score += Math.floor(Math.random() * 10);

  return Math.min(score, 95);
}

// 📍 INDUSTRY
function detectIndustry(input) {
  if (input.includes("plumb")) return "Plumbing";
  if (input.includes("roof")) return "Roofing";
  if (input.includes("shop") || input.includes("store")) return "E-commerce";
  if (input.includes("ai")) return "AI / SaaS";
  return "Business";
}

// 🎬 DELAY
function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// 🚀 MAIN ANALYSIS
async function analyzeSite() {
  const inputRaw = document.getElementById("site").value;
  const input = inputRaw.toLowerCase();
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Enter your website URL";
    return;
  }

  // 🚫 LIMIT (REAL CHECK)
  if (!paid && uses >= 3) {
    output.innerHTML = `
      🚫 Free limit reached (3 analyses)<br><br>

      ⚠️ Most users improve their score by 20–40 points<br><br>

      <div class="highlight">
      Small fixes = BIG revenue gains
      </div><br>

      <button class="btn" onclick="goToCheckout()">Unlock Full Access</button>
    `;
    return;
  }

  uses++;
  localStorage.setItem("uses", uses);
  updateStatus();

  // 🎬 LOADING
  output.innerHTML = `
    <div>Analyzing website...</div>
    <div style="background:#1e293b;border-radius:8px;overflow:hidden;">
      <div id="bar" style="height:10px;width:0%;background:#22c55e;"></div>
    </div>
    <div id="progressText">0%</div>
  `;

  const bar = document.getElementById("bar");
  const text = document.getElementById("progressText");

  for (let i = 0; i <= 100; i++) {
    await delay(10);
    bar.style.width = i + "%";
    text.innerText = i + "%";
  }

  const score = calculateScore(input);
  const industry = detectIndustry(input);

  const issues = [
    "No clear headline (users leave fast)",
    "Weak call-to-action placement",
    "No testimonials or reviews",
    "Low trust signals",
    "Poor conversion flow"
  ].sort(() => 0.5 - Math.random()).slice(0,3);

  // 🔒 FREE VERSION
  if (!paid) {
    output.innerHTML = `
      <strong>📊 Website Score: ${score}/100</strong><br><br>

      📍 Industry: ${industry}<br><br>

      ❌ ${issues.join("<br>❌ ")}<br><br>

      <div class="highlight">
      🔒 See exactly how to increase conversions by 30%+
      </div><br>

      <strong>${score} → ${score + 25}+ 🚀</strong><br><br>

      <button class="btn" onclick="goToCheckout()">Unlock Full Report ($9)</button>
    `;
    return;
  }

  // 💰 FULL REPORT
  const result = `
📊 Website Score: ${score}/100

📍 Industry: ${industry}

━━━ PERFORMANCE ━━━
🎨 Design: ${(score/10).toFixed(1)}/10
🔍 SEO: ${(score/12).toFixed(1)}/10
💰 Conversion: ${(score/14).toFixed(1)}/10

━━━ ISSUES ━━━
${issues.map(i => "❌ " + i).join("\n")}

━━━ FIXES ━━━
✔ Add strong headline → +15  
✔ Add testimonials → +10  
✔ Improve CTA → +12  

🚀 Potential Score: ${score + 25}+
`;

  output.innerHTML = result.replace(/\n/g, "<br>");

  saveReport(inputRaw, result);
}

// 💾 SAVE REPORT
function saveReport(site, result) {
  const email = localStorage.getItem("userEmail");
  if (!email) return;

  const reports = JSON.parse(localStorage.getItem("reports") || "[]");

  reports.push({
    site,
    result,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("reports", JSON.stringify(reports));
  loadReports();
}

// 🚀 INIT
checkAccess();
loadReports();
</script>
