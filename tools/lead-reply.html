<script>
let uses = localStorage.getItem('uses') || 0;
let paid = localStorage.getItem('paid');

function generateReply() {
  const input = document.getElementById('lead').value;
  const output = document.getElementById('output');

  if (!input) {
    output.innerText = "Enter a message";
    return;
  }

  // 🔒 LIMIT ONLY IF NOT PAID
  if (!paid && uses >= 3) {
    output.innerHTML = `
      🚫 Free limit reached<br><br>
      <a href="/" style="color:#38bdf8;">Upgrade to unlock unlimited replies</a>
    `;
    return;
  }

  uses++;
  localStorage.setItem('uses', uses);

  output.innerText = "Generating...";

  setTimeout(() => {
    output.innerText =
      "Hey! Thanks for reaching out — we'd love to help. When are you available for a quick call?";
  }, 1000);
}
</script>
